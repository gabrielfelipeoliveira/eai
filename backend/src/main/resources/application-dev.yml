spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eai
    username: eai
    password: eai
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

eai:
  security:
    jwt-secret: ${JWT_SECRET:eai-local-development-secret-change-me}
  email:
    importer:
      enabled: false
      fixed-delay: 60000
