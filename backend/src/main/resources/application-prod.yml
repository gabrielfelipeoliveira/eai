spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    locations: classpath:db/migration

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

server:
  port: ${PORT:8080}

eai:
  security:
    jwt-secret: ${JWT_SECRET}
    cors:
      allowed-origins: ${EAI_CORS_ALLOWED_ORIGINS}
  email:
    credentials:
      secret: ${EAI_EMAIL_CREDENTIALS_SECRET}
      previous-secrets: ${EAI_EMAIL_CREDENTIALS_PREVIOUS_SECRETS:}
      reencrypt-on-startup: ${EAI_EMAIL_CREDENTIALS_REENCRYPT_ON_STARTUP:false}
    importer:
      enabled: ${EAI_EMAIL_IMPORTER_ENABLED:false}
      fixed-delay: ${EAI_EMAIL_IMPORTER_FIXED_DELAY:60000}
  whatsapp:
    cloud-api:
      phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID}
      business-account-id: ${META_WHATSAPP_BUSINESS_ACCOUNT_ID}
      access-token: ${META_WHATSAPP_ACCESS_TOKEN}
      app-secret: ${META_WHATSAPP_APP_SECRET}
      verify-token: ${META_WHATSAPP_VERIFY_TOKEN}
