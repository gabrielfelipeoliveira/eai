spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${PORT:8080}

eai:
  security:
    jwt-secret: ${JWT_SECRET}
  email:
    importer:
      enabled: ${EAI_EMAIL_IMPORTER_ENABLED:false}
      fixed-delay: ${EAI_EMAIL_IMPORTER_FIXED_DELAY:60000}
