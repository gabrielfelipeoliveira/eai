spring:
  datasource:
    url: jdbc:h2:mem:eai;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed/mandatory

eai:
  security:
    jwt-secret: eai-test-secret-change-me
  email:
    importer:
      enabled: false
      fixed-delay: 60000
  whatsapp:
    cloud-api:
      company-id: 00000000-0000-0000-0000-000000000101
      store-id: 00000000-0000-0000-0000-000000000201
