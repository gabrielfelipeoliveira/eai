spring:
  datasource:
    url: jdbc:h2:mem:eai;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

eai:
  security:
    jwt-secret: eai-test-secret-change-me
  email:
    importer:
      enabled: false
      fixed-delay: 60000
