spring:
  application:
    name: eai-backend
  profiles:
    default: dev
  jpa:
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

eai:
  security:
    access-token-ttl-minutes: 15
    refresh-token-ttl-hours: 720
    cors:
      allowed-origins: ${EAI_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
      allowed-methods: ${EAI_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${EAI_CORS_ALLOWED_HEADERS:Authorization,Content-Type}
  email:
    credentials:
      secret: ${EAI_EMAIL_CREDENTIALS_SECRET:local-development-email-credential-secret}
      previous-secrets: ${EAI_EMAIL_CREDENTIALS_PREVIOUS_SECRETS:}
      reencrypt-on-startup: ${EAI_EMAIL_CREDENTIALS_REENCRYPT_ON_STARTUP:false}
    importer:
      enabled: false
      fixed-delay: 60000
  media:
    storage:
      provider: ${EAI_MEDIA_STORAGE_PROVIDER:local}
      local-directory: ${EAI_MEDIA_STORAGE_LOCAL_DIRECTORY:.run-logs/media-storage}
  whatsapp:
    media:
      max-image-size-bytes: ${EAI_WHATSAPP_MEDIA_MAX_IMAGE_SIZE_BYTES:5242880}
      max-audio-size-bytes: ${EAI_WHATSAPP_MEDIA_MAX_AUDIO_SIZE_BYTES:16777216}
      max-document-size-bytes: ${EAI_WHATSAPP_MEDIA_MAX_DOCUMENT_SIZE_BYTES:104857600}
      allowed-mime-types: ${EAI_WHATSAPP_MEDIA_ALLOWED_MIME_TYPES:image/jpeg,image/png,audio/aac,audio/mp4,audio/mpeg,audio/amr,audio/ogg,text/plain,application/pdf,application/vnd.ms-powerpoint,application/msword,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
    cloud-api:
      phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID:}
      business-account-id: ${META_WHATSAPP_BUSINESS_ACCOUNT_ID:}
      access-token: ${META_WHATSAPP_ACCESS_TOKEN:}
      app-secret: ${META_WHATSAPP_APP_SECRET:}
      verify-token: ${META_WHATSAPP_VERIFY_TOKEN:}
      graph-api-version: ${META_WHATSAPP_GRAPH_API_VERSION:v25.0}
      company-id: ${META_WHATSAPP_COMPANY_ID:}
      store-id: ${META_WHATSAPP_STORE_ID:}
