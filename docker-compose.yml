services:
  postgres:
    image: postgres:16-alpine
    container_name: eai-postgres
    environment:
      POSTGRES_DB: eai
      POSTGRES_USER: eai
      POSTGRES_PASSWORD: eai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eai -d eai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
